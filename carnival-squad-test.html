<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Improved Carnival Squad UI Test</title>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      margin: 0;
      padding: 20px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
    }

    .test-header {
      text-align: center;
      color: white;
      margin-bottom: 30px;
    }

    .test-header h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
    }

    .test-header p {
      font-size: 1.1rem;
      opacity: 0.9;
    }

    .test-controls {
      background: white;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
    }

    .test-controls h3 {
      margin-top: 0;
      color: #495057;
    }

    .control-group {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
      flex-wrap: wrap;
    }

    .btn {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 500;
      transition: transform 0.2s;
    }

    .btn:hover {
      transform: translateY(-2px);
    }

    .btn-secondary {
      background: #6c757d;
    }

    .btn-success {
      background: #28a745;
    }

    .btn-danger {
      background: #dc3545;
    }

    .status-indicator {
      display: inline-block;
      padding: 5px 10px;
      border-radius: 6px;
      font-size: 0.9rem;
      font-weight: 500;
      margin-left: 10px;
    }

    .status-success {
      background: #d4edda;
      color: #155724;
    }

    .status-error {
      background: #f8d7da;
      color: #721c24;
    }

    .status-warning {
      background: #fff3cd;
      color: #856404;
    }

    .debug-info {
      background: #f8f9fa;
      border: 1px solid #e9ecef;
      border-radius: 8px;
      padding: 15px;
      margin-top: 15px;
      font-family: monospace;
      font-size: 0.9rem;
      max-height: 200px;
      overflow-y: auto;
    }

    .debug-info h4 {
      margin-top: 0;
      color: #495057;
    }

    .debug-item {
      margin-bottom: 5px;
      padding: 2px 0;
    }

    .debug-label {
      font-weight: bold;
      color: #667eea;
    }

    .debug-value {
      color: #6c757d;
    }
  </style>
</head>

<body>
  <div class="test-header">
    <h1>🎭 Improved Carnival Squad UI</h1>
    <p>Test page for better performance and data synchronization</p>
  </div>

  <div class="test-controls">
    <h3>Test Controls</h3>

    <div class="control-group">
      <button class="btn" onclick="testInitialization()">Test Initialization</button>
      <button class="btn" onclick="testRefresh()">Test Refresh</button>
      <button class="btn" onclick="testAddMember()">Test Add Member</button>
      <button class="btn btn-secondary" onclick="testPremiumStatus()">Test Premium Status</button>
      <button class="btn btn-success" onclick="testDataSync()">Test Data Sync</button>
      <button class="btn btn-danger" onclick="testErrorHandling()">Test Error Handling</button>
    </div>

    <div class="control-group">
      <button class="btn" onclick="showDebugInfo()">Show Debug Info</button>
      <button class="btn btn-secondary" onclick="clearDebugInfo()">Clear Debug</button>
      <button class="btn" onclick="resetUI()">Reset UI</button>
    </div>

    <div id="testStatus"></div>

    <div id="debugInfo" class="debug-info" style="display: none;">
      <h4>Debug Information</h4>
      <div id="debugContent"></div>
    </div>
  </div>

  <!-- The improved Carnival Squad UI will be loaded here -->
  <div id="carnivalSquadContainer"></div>

  <!-- Include the improved Carnival Squad UI -->
  <script src="carnival-squad-ui-improved.js"></script>

  <script>
    // Test functions
    function showStatus(message, type = 'success') {
      const statusDiv = document.getElementById('testStatus');
      statusDiv.innerHTML = `<span class="status-indicator status-${type}">${message}</span>`;

      setTimeout(() => {
        statusDiv.innerHTML = '';
      }, 5000);
    }

    function testInitialization() {
      showStatus('Testing initialization...', 'warning');

      if (window.improvedCarnivalSquad) {
        showStatus('✅ Carnival Squad UI is initialized', 'success');
      } else {
        showStatus('❌ Carnival Squad UI not found', 'error');
      }
    }

    function testRefresh() {
      showStatus('Testing data refresh...', 'warning');

      if (window.improvedCarnivalSquad) {
        window.improvedCarnivalSquad.refreshData().then(() => {
          showStatus('✅ Data refresh completed', 'success');
        }).catch(error => {
          showStatus('❌ Refresh failed: ' + error.message, 'error');
        });
      } else {
        showStatus('❌ Carnival Squad UI not available', 'error');
      }
    }

    function testAddMember() {
      showStatus('Testing add member functionality...', 'warning');

      if (window.improvedCarnivalSquad) {
        // Simulate adding a test member
        const testMember = {
          name: 'Test Member ' + Date.now(),
          phone: '1234567890',
          email: 'test@example.com',
          relationship: 'Friend'
        };

        window.improvedCarnivalSquad.addSquadMember(testMember).then(() => {
          showStatus('✅ Test member added successfully', 'success');
          // Refresh the UI
          window.improvedCarnivalSquad.refreshData();
        }).catch(error => {
          showStatus('❌ Failed to add test member: ' + error.message, 'error');
        });
      } else {
        showStatus('❌ Carnival Squad UI not available', 'error');
      }
    }

    function testPremiumStatus() {
      showStatus('Testing premium status...', 'warning');

      if (window.improvedCarnivalSquad) {
        const isPremium = window.improvedCarnivalSquad.isPremiumUser();
        const user = window.improvedCarnivalSquad.getCurrentUser();

        showStatus(`✅ Premium status: ${isPremium ? 'Premium' : 'Basic'} (User: ${user?.email || 'None'})`, 'success');
      } else {
        showStatus('❌ Carnival Squad UI not available', 'error');
      }
    }

    function testDataSync() {
      showStatus('Testing data synchronization...', 'warning');

      if (window.improvedCarnivalSquad) {
        const members = window.improvedCarnivalSquad.getSquadMembers();
        const user = window.improvedCarnivalSquad.getCurrentUser();

        showStatus(`✅ Sync test: ${members.length} members, User: ${user?.email || 'None'}`, 'success');
      } else {
        showStatus('❌ Carnival Squad UI not available', 'error');
      }
    }

    function testErrorHandling() {
      showStatus('Testing error handling...', 'warning');

      if (window.improvedCarnivalSquad) {
        // Simulate an error by trying to access invalid data
        try {
          window.improvedCarnivalSquad.showErrorMessage('This is a test error message');
          showStatus('✅ Error handling test completed', 'success');
        } catch (error) {
          showStatus('❌ Error handling test failed: ' + error.message, 'error');
        }
      } else {
        showStatus('❌ Carnival Squad UI not available', 'error');
      }
    }

    function showDebugInfo() {
      const debugInfo = document.getElementById('debugInfo');
      const debugContent = document.getElementById('debugContent');

      if (window.improvedCarnivalSquad) {
        const squad = window.improvedCarnivalSquad;
        const user = squad.getCurrentUser();
        const members = squad.getSquadMembers();

        debugContent.innerHTML = `
                    <div class="debug-item">
                        <span class="debug-label">Initialized:</span>
                        <span class="debug-value">${squad.isInitialized}</span>
                    </div>
                    <div class="debug-item">
                        <span class="debug-label">Loading:</span>
                        <span class="debug-value">${squad.isLoading}</span>
                    </div>
                    <div class="debug-item">
                        <span class="debug-label">User:</span>
                        <span class="debug-value">${user?.email || 'None'}</span>
                    </div>
                    <div class="debug-item">
                        <span class="debug-label">Premium:</span>
                        <span class="debug-value">${squad.isPremiumUser()}</span>
                    </div>
                    <div class="debug-item">
                        <span class="debug-label">Members Count:</span>
                        <span class="debug-value">${members.length}</span>
                    </div>
                    <div class="debug-item">
                        <span class="debug-label">Last Sync:</span>
                        <span class="debug-value">${squad.lastSyncTime || 'Never'}</span>
                    </div>
                    <div class="debug-item">
                        <span class="debug-label">Avatar System:</span>
                        <span class="debug-value">${window.avatarSystem ? 'Available' : 'Not Available'}</span>
                    </div>
                    <div class="debug-item">
                        <span class="debug-label">Supabase:</span>
                        <span class="debug-value">${window.supabase ? 'Available' : 'Not Available'}</span>
                    </div>
                `;
      } else {
        debugContent.innerHTML = '<div class="debug-item">Carnival Squad UI not available</div>';
      }

      debugInfo.style.display = 'block';
    }

    function clearDebugInfo() {
      const debugInfo = document.getElementById('debugInfo');
      debugInfo.style.display = 'none';
    }

    function resetUI() {
      showStatus('Resetting UI...', 'warning');

      if (window.improvedCarnivalSquad) {
        window.improvedCarnivalSquad.destroy();
      }

      // Reinitialize after a short delay
      setTimeout(() => {
        window.improvedCarnivalSquad = new ImprovedCarnivalSquadUI();
        showStatus('✅ UI reset completed', 'success');
      }, 1000);
    }

    // Initialize Supabase for testing (you'll need to add your own config)
    async function initializeSupabase() {
      try {
        const supabaseUrl = 'YOUR_SUPABASE_URL';
        const supabaseKey = 'YOUR_SUPABASE_ANON_KEY';

        if (supabaseUrl === 'YOUR_SUPABASE_URL') {
          console.log('⚠️ Please update Supabase configuration in the test page');
          return;
        }

        window.supabase = supabase.createClient(supabaseUrl, supabaseKey);
        console.log('✅ Supabase initialized for testing');

      } catch (error) {
        console.error('❌ Failed to initialize Supabase:', error);
      }
    }

    // Initialize when page loads
    document.addEventListener('DOMContentLoaded', () => {
      console.log('🚀 Test page loaded');

      // Initialize Supabase if configured
      initializeSupabase();

      // Show initial status
      setTimeout(() => {
        if (window.improvedCarnivalSquad) {
          showStatus('✅ Carnival Squad UI loaded successfully', 'success');
        } else {
          showStatus('⚠️ Carnival Squad UI not loaded yet', 'warning');
        }
      }, 2000);
    });

    // Global test functions for console access
    window.testCarnivalSquad = {
      testInitialization,
      testRefresh,
      testAddMember,
      testPremiumStatus,
      testDataSync,
      testErrorHandling,
      showDebugInfo,
      resetUI
    };

    console.log('🎭 Carnival Squad Test Page Ready!');
    console.log('💡 Use window.testCarnivalSquad to access test functions');
  </script>
</body>

</html>
