<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GroupTracker - Real-time Group Location Tracking</title>
    <meta name="description" content="Track your group's location in real-time. Perfect for events, festivals, and meetups.">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .container {
            text-align: center;
            max-width: 600px;
            padding: 2rem;
        }
        
        .logo {
            font-size: 3rem;
            margin-bottom: 1rem;
            font-weight: bold;
        }
        
        .subtitle {
            font-size: 1.2rem;
            margin-bottom: 2rem;
            opacity: 0.9;
        }
        
        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin: 2rem 0;
        }
        
        .feature {
            background: rgba(255,255,255,0.1);
            padding: 1rem;
            border-radius: 8px;
            backdrop-filter: blur(10px);
        }
        
        .feature-icon {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }
        
        .cta-button {
            background: #ff6b35;
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 1rem;
        }
        
        .cta-button:hover {
            background: #e55a2b;
            transform: translateY(-2px);
        }
        
        .loading {
            display: none;
            margin-top: 1rem;
        }
        
        .spinner {
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top: 3px solid white;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🗺️ GroupTracker</div>
        <div class="subtitle">Real-time group location tracking for events and festivals</div>
        
        <div class="features">
            <div class="feature">
                <div class="feature-icon">📍</div>
                <h3>Live Tracking</h3>
                <p>See where your group members are in real-time</p>
            </div>
            <div class="feature">
                <div class="feature-icon">🚨</div>
                <h3>Emergency Alerts</h3>
                <p>Send emergency notifications to your group</p>
            </div>
            <div class="feature">
                <div class="feature-icon">👥</div>
                <h3>Group Management</h3>
                <p>Create and join groups with unique codes</p>
            </div>
        </div>
        
        <button class="cta-button" onclick="launchApp()">
            Launch GroupTracker
        </button>
        
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Loading application...</p>
        </div>
    </div>
    
    <script>
        function launchApp() {
            document.getElementById('loading').style.display = 'block';
            document.querySelector('.cta-button').style.display = 'none';
            
            // Redirect to the main application
            setTimeout(() => {
                window.location.href = './grouptracker';
            }, 1000);
        }
        
        // Auto-launch after 3 seconds
        setTimeout(() => {
            launchApp();
        }, 3000);
    </script>
</body>
</html>
