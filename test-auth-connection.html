<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Auth Connection Test</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
    }

    .test-section {
      margin: 20px 0;
      padding: 15px;
      border: 1px solid #ccc;
    }

    .success {
      background-color: #d4edda;
      border-color: #c3e6cb;
    }

    .error {
      background-color: #f8d7da;
      border-color: #f5c6cb;
    }

    button {
      padding: 10px 20px;
      margin: 5px;
      cursor: pointer;
    }

    pre {
      background: #f8f9fa;
      padding: 10px;
      border-radius: 5px;
      overflow-x: auto;
    }
  </style>
</head>

<body>
  <h1>🔐 Auth Connection Test</h1>

  <div class="test-section">
    <h3>Test Create Account Button</h3>
    <p>This test will verify that the Create Account button is properly connected to Supabase.</p>
    <button onclick="testCreateAccount()">Test Create Account</button>
    <div id="create-account-result"></div>
  </div>

  <div class="test-section">
    <h3>Test Auth Service</h3>
    <button onclick="testAuthService()">Test Auth Service</button>
    <div id="auth-service-result"></div>
  </div>

  <!-- Supabase SDK -->
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

  <script type="module">
    let supabaseClient = null;
    let authService = null;

    // Initialize Supabase
    async function initializeSupabase() {
      try {
        const config = await import('./supabase-config-secret.js');
        supabaseClient = window.supabase.createClient(
          config.default.supabaseUrl,
          config.default.supabaseAnonKey
        );

        // Import auth service
        const authModule = await import('./supabase-auth-service.js');
        authService = authModule.supabaseAuthService;
        authModule.setSupabaseInstance(supabaseClient);

        console.log('✅ Supabase initialized');
        return true;
      } catch (error) {
        console.error('❌ Error initializing Supabase:', error);
        return false;
      }
    }

    // Test Create Account functionality
    window.testCreateAccount = async function () {
      const result = document.getElementById('create-account-result');
      result.innerHTML = '<div class="warning">⏳ Testing Create Account...</div>';

      try {
        if (!supabaseClient) {
          const initialized = await initializeSupabase();
          if (!initialized) {
            result.innerHTML = '<div class="error">❌ Failed to initialize Supabase</div>';
            return;
          }
        }

        // Test with a real email
        const testEmail = 'test-' + Date.now() + '@gmail.com';
        const { data, error } = await supabaseClient.auth.signUp({
          email: testEmail,
          password: 'testpassword123'
        });

        if (error) {
          result.innerHTML = '<div class="error">❌ Create Account failed: ' + error.message + '</div>';
        } else {
          result.innerHTML = '<div class="success">✅ Create Account successful!</div>';
          result.innerHTML += '<pre>User ID: ' + data.user.id + '\nEmail: ' + data.user.email + '</pre>';
        }
      } catch (error) {
        result.innerHTML = '<div class="error">❌ Test failed: ' + error.message + '</div>';
      }
    };

    // Test Auth Service
    window.testAuthService = async function () {
      const result = document.getElementById('auth-service-result');
      result.innerHTML = '<div class="warning">⏳ Testing Auth Service...</div>';

      try {
        if (!authService) {
          const initialized = await initializeSupabase();
          if (!initialized) {
            result.innerHTML = '<div class="error">❌ Failed to initialize Auth Service</div>';
            return;
          }
        }

        const testEmail = 'test-' + Date.now() + '@gmail.com';
        const signupResult = await authService.signUp(testEmail, 'testpassword123');

        if (signupResult.success) {
          result.innerHTML = '<div class="success">✅ Auth Service signup successful!</div>';
          result.innerHTML += '<pre>' + JSON.stringify(signupResult, null, 2) + '</pre>';
        } else {
          result.innerHTML = '<div class="error">❌ Auth Service signup failed: ' + signupResult.error + '</div>';
        }
      } catch (error) {
        result.innerHTML = '<div class="error">❌ Auth Service test failed: ' + error.message + '</div>';
      }
    };

    // Auto-initialize
    initializeSupabase();
  </script>
</body>

</html>
