<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Session Test - Site 1</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      min-height: 100vh;
    }

    .container {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 30px;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    h1 {
      text-align: center;
      margin-bottom: 30px;
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
    }

    .status {
      background: rgba(255, 255, 255, 0.2);
      border-radius: 10px;
      padding: 20px;
      margin: 20px 0;
      border: 1px solid rgba(255, 255, 255, 0.3);
    }

    .auth-buttons {
      display: flex;
      gap: 15px;
      justify-content: center;
      margin: 30px 0;
    }

    .btn {
      background: linear-gradient(135deg, #ff6b6b, #4ecdc4);
      border: none;
      color: white;
      padding: 12px 24px;
      border-radius: 25px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s ease;
      text-decoration: none;
      display: inline-block;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(255, 107, 107, 0.4);
    }

    .site-info {
      background: rgba(0, 0, 0, 0.2);
      border-radius: 10px;
      padding: 15px;
      margin: 20px 0;
      font-family: monospace;
      font-size: 14px;
    }

    .test-links {
      display: flex;
      gap: 15px;
      justify-content: center;
      margin: 30px 0;
      flex-wrap: wrap;
    }

    .test-link {
      background: rgba(255, 255, 255, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.3);
      color: white;
      padding: 10px 20px;
      border-radius: 15px;
      text-decoration: none;
      transition: all 0.3s ease;
    }

    .test-link:hover {
      background: rgba(255, 255, 255, 0.3);
      transform: translateY(-1px);
    }
  </style>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

  <!-- Auth Service -->
  <script type="module" src="auth-service.js"></script>
</head>

<body>
  <div class="container">
    <h1>🔐 Session Test - Site 1</h1>

    <div class="site-info">
      <strong>Site ID:</strong> <span id="siteId">Loading...</span><br>
      <strong>Domain:</strong> <span id="domain">Loading...</span><br>
      <strong>Port:</strong> <span id="port">Loading...</span><br>
      <strong>Path:</strong> <span id="path">Loading...</span>
    </div>

    <div class="status" id="authStatus">
      <h3>Authentication Status</h3>
      <p id="statusText">Loading...</p>
      <p id="userInfo" style="display: none;"></p>
    </div>

    <div class="auth-buttons">
      <button class="btn" onclick="testSignIn()">🔐 Test Sign In</button>
      <button class="btn" onclick="testSignOut()">🚪 Test Sign Out</button>
      <button class="btn" onclick="checkSession()">🔍 Check Session</button>
    </div>

    <div class="test-links">
      <a href="http://localhost:5501" class="test-link">🏠 Main App (Port 5501)</a>
      <a href="http://localhost:5502" class="test-link">🔄 Test Site 2 (Port 5502)</a>
      <a href="http://localhost:5503" class="test-link">🔄 Test Site 3 (Port 5503)</a>
    </div>

    <div class="status">
      <h3>Session Storage</h3>
      <pre id="sessionData">Loading...</pre>
    </div>
  </div>

  <script>
    let authService;

    // Wait for auth service to be ready
    async function initTest() {
      // Wait for auth service to be available
      let attempts = 0;
      while (attempts < 50) {
        if (window.authService) {
          authService = window.authService;
          break;
        }
        attempts++;
        await new Promise(resolve => setTimeout(resolve, 100));
      }

      if (!authService) {
        console.error('Auth service not available');
        return;
      }

      // Update site info
      const siteInfo = authService.getSiteInfo();
      document.getElementById('siteId').textContent = siteInfo.siteId;
      document.getElementById('domain').textContent = siteInfo.domain;
      document.getElementById('port').textContent = window.location.port || '80';
      document.getElementById('path').textContent = siteInfo.path;

      // Set up auth state listener
      authService.onAuthStateChanged((user) => {
        updateAuthStatus(user);
        updateSessionData();
      });

      // Initial update
      updateAuthStatus(authService.getCurrentUser());
      updateSessionData();
    }

    function updateAuthStatus(user) {
      const statusText = document.getElementById('statusText');
      const userInfo = document.getElementById('userInfo');

      if (user) {
        statusText.textContent = `✅ Authenticated on ${authService.getSiteInfo().siteId}`;
        userInfo.style.display = 'block';
        userInfo.innerHTML = `
          <strong>User:</strong> ${user.email}<br>
          <strong>UID:</strong> ${user.uid}<br>
          <strong>Display Name:</strong> ${user.displayName || 'Not set'}
        `;
      } else {
        statusText.textContent = `❌ Not authenticated on ${authService.getSiteInfo().siteId}`;
        userInfo.style.display = 'none';
      }
    }

    function updateSessionData() {
      const sessionData = document.getElementById('sessionData');
      const session = authService.getSessionStorage();

      const data = {
        siteId: authService.getSiteInfo().siteId,
        currentUser: session.get('current_user'),
        siteInfo: session.get('site_info'),
        allKeys: Object.keys(localStorage).filter(key => key.startsWith(`auth_session_${authService.getSiteInfo().siteId}`))
      };

      sessionData.textContent = JSON.stringify(data, null, 2);
    }

    async function testSignIn() {
      if (!authService) return;

      try {
        // Test with a demo account
        const result = await authService.signIn('test@example.com', 'password123');
        if (result.success) {
          alert('✅ Sign in successful!');
        } else {
          alert(`❌ Sign in failed: ${result.error}`);
        }
      } catch (error) {
        alert(`❌ Error: ${error.message}`);
      }
    }

    async function testSignOut() {
      if (!authService) return;

      try {
        const result = await authService.signOut();
        if (result.success) {
          alert('✅ Sign out successful!');
        } else {
          alert(`❌ Sign out failed: ${result.error}`);
        }
      } catch (error) {
        alert(`❌ Error: ${error.message}`);
      }
    }

    function checkSession() {
      updateSessionData();
      alert('Session data updated! Check the console for details.');
    }

    // Initialize when page loads
    document.addEventListener('DOMContentLoaded', initTest);
  </script>
</body>

</html>
