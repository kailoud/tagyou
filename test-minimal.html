<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minimal Test</title>
</head>

<body>
  <h1>Minimal Test</h1>
  <div id="status">Testing...</div>

  <script>
    console.log('📝 Basic script loaded');

    // Test if modules work at all
    import('./supabase-config-secret.js')
      .then(config => {
        console.log('✅ Config module loaded:', config);
        document.getElementById('status').innerHTML = '✅ Config module loaded';

        // Try to load avatar system
        return import('./avatar-system-v2.js');
      })
      .then(() => {
        console.log('✅ Avatar system module loaded');
        document.getElementById('status').innerHTML += '<br>✅ Avatar system module loaded';

        // Check if it's available globally
        setTimeout(() => {
          if (window.avatarSystemV2) {
            console.log('✅ Avatar system available globally');
            document.getElementById('status').innerHTML += '<br>✅ Avatar system available globally';
          } else {
            console.log('❌ Avatar system not available globally');
            document.getElementById('status').innerHTML += '<br>❌ Avatar system not available globally';
          }
        }, 1000);
      })
      .catch(error => {
        console.error('❌ Module loading error:', error);
        document.getElementById('status').innerHTML = `❌ Error: ${error.message}`;
      });
  </script>
</body>

</html>
