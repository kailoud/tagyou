<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Map Test</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }
        #map {
            width: 100vw;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1;
        }
        .status {
            position: fixed;
            top: 10px;
            left: 10px;
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 10px;
            border-radius: 5px;
            z-index: 1000;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="status" id="status">Loading map...</div>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const status = document.getElementById('status');
        const mapContainer = document.getElementById('map');
        
        function updateStatus(message) {
            status.textContent = message;
            console.log(message);
        }
        
        updateStatus('Leaflet loaded, initializing map...');
        
        try {
            // Initialize map
            const map = L.map('map', {
                zoomControl: false,
                preferCanvas: true,
                renderer: L.canvas(),
                fadeAnimation: false,
                zoomAnimation: false
            }).setView([51.5074, -0.1278], 10);
            
            updateStatus('Map initialized, loading tiles...');
            
            // Add tile layer
            const tileLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '',
                maxZoom: 14,
                minZoom: 8,
                subdomains: 'abc'
            }).addTo(map);
            
            updateStatus('Tile layer added, waiting for tiles...');
            
            // Monitor tile loading
            tileLayer.on('loading', function() {
                updateStatus('Tiles loading...');
            });
            
            tileLayer.on('load', function() {
                updateStatus('Tiles loaded successfully!');
            });
            
            tileLayer.on('tileerror', function(e) {
                updateStatus('Tile error: ' + e.url);
                console.error('Tile error:', e);
            });
            
            // Force refresh
            setTimeout(() => {
                map.invalidateSize();
                updateStatus('Map refreshed');
            }, 1000);
            
            updateStatus('Map setup complete');
            
        } catch (error) {
            updateStatus('Error: ' + error.message);
            console.error('Map error:', error);
        }
    </script>
</body>
</html>
