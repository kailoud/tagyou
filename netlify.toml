[build]
  publish = "."
  command = "echo 'No build command needed for static site'"

[build.environment]
  # These will be available during build time
  # You can override these in Netlify dashboard
  FIREBASE_API_KEY = "AIzaSyDWm3v-1WXxHWDYIzqK1nCjrBeVW-GvG1I"
  FIREBASE_AUTH_DOMAIN = "tagyouapp-b0d30.firebaseapp.com"
  FIREBASE_PROJECT_ID = "tagyouapp-b0d30"
  FIREBASE_STORAGE_BUCKET = "tagyouapp-b0d30.firebasestorage.app"
  FIREBASE_MESSAGING_SENDER_ID = "955342799504"
  FIREBASE_APP_ID = "1:955342799504:web:b5a084cc5c7aadfdc04e15"
  FIREBASE_MEASUREMENT_ID = "G-PQ4H26G1DG"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Redirects for SPA
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
